{% extends 'base.html' %}
{% block title %}Change Password - {{ site_settings.site_name|default:"Bhartiya Janta News" }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6 max-w-md">
    <h1 class="text-2xl font-bold mb-6"><i class="fas fa-lock mr-2 text-blue-600"></i>Change Password</h1>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-8">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
