{% extends 'base.html' %}
{% block title %}Website Settings - {{ site_settings.site_name|default:"Bhartiya Janta News" }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6 max-w-3xl">
    <h1 class="text-2xl font-bold mb-6">Website Settings</h1>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-8">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium">Site Name</label><input type="text" name="site_name" value="{{ settings.site_name }}" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">Tagline</label><input type="text" name="site_tagline" value="{{ settings.site_tagline }}" class="w-full px-4 py-2 border rounded-lg"></div>
            </div>
            <div><label class="block text-sm font-medium">Footer Text</label><textarea name="footer_text" rows="3" class="w-full px-4 py-2 border rounded-lg">{{ settings.footer_text }}</textarea></div>
            <div><label class="block text-sm font-medium">Copyright Text</label><input type="text" name="copyright_text" value="{{ settings.copyright_text }}" class="w-full px-4 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium">Contact Email</label><input type="email" name="contact_email" value="{{ settings.contact_email }}" class="w-full px-4 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium">Contact Phone</label><input type="text" name="contact_phone" value="{{ settings.contact_phone }}" class="w-full px-4 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium">Address</label><textarea name="address" rows="2" class="w-full px-4 py-2 border rounded-lg">{{ settings.address }}</textarea></div>
            <div><label class="block text-sm font-medium">Site Logo</label><input type="file" name="site_logo" class="w-full"></div>
            <div><label class="block text-sm font-medium">Favicon</label><input type="file" name="site_favicon" class="w-full"></div>
            <h3 class="font-bold pt-4 border-t">Social Links</h3>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium">Facebook</label><input type="url" name="facebook_url" value="{{ settings.facebook_url }}" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">Twitter</label><input type="url" name="twitter_url" value="{{ settings.twitter_url }}" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">Instagram</label><input type="url" name="instagram_url" value="{{ settings.instagram_url }}" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">YouTube</label><input type="url" name="youtube_url" value="{{ settings.youtube_url }}" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium">LinkedIn</label><input type="url" name="linkedin_url" value="{{ settings.linkedin_url }}" class="w-full px-4 py-2 border rounded-lg"></div>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
