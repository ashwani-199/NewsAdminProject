{% extends 'base.html' %}
{% block title %}Reset Password - {{ site_settings.site_name|default:"Bhartiya Janta News" }}{% endblock %}

{% block content %}
<div class="min-h-[50vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-center mb-6">Reset Password</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">New Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" required class="w-full px-4 py-2 border rounded-lg focus:border-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
