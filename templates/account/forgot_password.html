{% extends 'base.html' %}
{% block title %}Forgot Password - NewsPortal{% endblock %}

{% block content %}
<div class="min-h-[50vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-2xl font-bold">Forgot Password</h1>
            <p class="text-gray-500 text-sm">Enter your email to receive reset instructions</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">Send Reset Link</button>
        </form>
        <p class="text-center text-sm mt-4"><a href="{% url 'account:login' %}" class="text-blue-600 hover:underline">Back to Login</a></p>
    </div>
</div>
{% endblock %}
