{% extends 'base.html' %}
{% block title %}Forgot Password - NewsPortal{% endblock %}

{% block content %}
<div class="min-h-[50vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-2xl font-bold">Forgot Password</h1>
            <p class="text-gray-500 text-sm">Enter your email to receive reset instructions</p>
        </div>
        <form method="post" class="space-y-4" id="forgotForm" novalidate>
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-1">Email Address</label>
                {{ form.email }}
                <p class="text-red-500 text-xs mt-1 hidden" id="forgotEmailError"></p>
                <p class="text-green-500 text-xs mt-1 hidden" id="forgotEmailSuccess"></p>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-medium hover:bg-blue-700 transition">
                <i class="fas fa-paper-plane mr-1"></i> Send Reset Link
            </button>
        </form>
        <p class="text-center text-sm mt-4"><a href="{% url 'account:login' %}" class="text-blue-600 hover:underline"><i class="fas fa-arrow-left mr-1"></i>Back to Login</a></p>
    </div>
</div>
<script>
function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); el.classList.add('text-red-500'); el.classList.remove('text-green-500'); }
function showSuccess(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); el.classList.add('text-green-500'); el.classList.remove('text-red-500'); }
function clearMsg(id) { const el = document.getElementById(id); el.textContent = ''; el.classList.add('hidden'); }
function validateEmail(val) {
    if (!val.trim()) return 'Email is required.';
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if (!re.test(val)) return 'Enter a valid email address.';
    return '';
}
const emailInput = document.getElementById('id_email');
emailInput.addEventListener('input', function() {
    const e = validateEmail(this.value);
    if (e) showError('forgotEmailError', e), clearMsg('forgotEmailSuccess');
    else showSuccess('forgotEmailSuccess', 'Valid email'), clearMsg('forgotEmailError');
});
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    const err = validateEmail(emailInput.value);
    if (err) { showError('forgotEmailError', err); clearMsg('forgotEmailSuccess'); e.preventDefault(); }
});
</script>
{% endblock %}
