<nav class="bg-gray-800 dark:bg-gray-950 text-white">
    <div class="container mx-auto px-4">
        <ul class="flex items-center gap-1 overflow-x-auto py-2 text-sm font-medium">
            <li><a href="{% url 'news:home' %}" class="px-3 py-1.5 rounded hover:bg-gray-700 whitespace-nowrap"><i class="fas fa-home mr-1"></i>Home</a></li>
            {% for cat in nav_categories %}
            <li class="mega-menu relative">
                <a href="{{ cat.get_absolute_url }}" class="px-3 py-1.5 rounded hover:bg-gray-700 whitespace-nowrap flex items-center gap-1">
                    {% if cat.icon %}<i class="{{ cat.icon }} mr-1"></i>{% endif %}
                    {{ cat.name }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>
