<div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl p-6 text-white">
    <h3 class="text-lg font-bold mb-2"><i class="fas fa-envelope-open-text mr-2"></i>Stay Updated</h3>
    <p class="text-sm text-blue-100 mb-4">Get the latest news delivered to your inbox.</p>
    <form hx-post="{% url 'newsletter:subscribe' %}" hx-target="this" hx-swap="innerHTML">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email" required
               class="w-full px-4 py-2.5 rounded-lg mb-3 text-gray-900 placeholder-gray-500 outline-none">
        <button type="submit" class="w-full bg-white text-blue-700 font-semibold py-2.5 rounded-lg hover:bg-blue-50 transition">
            <i class="fas fa-paper-plane mr-2"></i>Subscribe
        </button>
    </form>
</div>
