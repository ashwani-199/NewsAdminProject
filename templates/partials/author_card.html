<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-5">
    <h3 class="text-lg font-bold mb-3">About the Author</h3>
    <a href="{% url 'news:author' article.author.pk %}" class="flex items-center gap-3">
        {% if article.author.avatar %}
        <img src="{{ article.author.avatar.url }}" alt="" class="w-16 h-16 rounded-full object-cover">
        {% else %}
        <div class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-white text-xl font-bold">{{ article.author.username|first|upper }}</div>
        {% endif %}
        <div>
            <h4 class="font-bold">{{ article.author.get_full_name|default:article.author.username }}</h4>
            {% if article.author.bio %}<p class="text-sm text-gray-500 line-clamp-2">{{ article.author.bio }}</p>{% endif %}
        </div>
    </a>
</div>
