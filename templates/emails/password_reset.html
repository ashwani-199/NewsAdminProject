<!DOCTYPE html>
<html><body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Password Reset Request</h2>
    <p>Hi {{ user.get_full_name|default:user.username }},</p>
    <p>Click the button below to reset your password:</p>
    <a href="{{ reset_url }}" style="display: inline-block; background: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; margin: 20px 0;">Reset Password</a>
    <p>Or copy this link: {{ reset_url }}</p>
    <p>This link expires in 1 hour.</p>
</body></html>
