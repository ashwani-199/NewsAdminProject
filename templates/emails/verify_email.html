<!DOCTYPE html>
<html><body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Welcome to NewsPortal!</h2>
    <p>Hi {{ user.get_full_name|default:user.username }},</p>
    <p>Please click the button below to verify your email address:</p>
    <a href="{{ verification_url }}" style="display: inline-block; background: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; margin: 20px 0;">Verify Email</a>
    <p>Or copy this link: {{ verification_url }}</p>
    <p>This link expires in 24 hours.</p>
    <p>Thank you!</p>
</body></html>
